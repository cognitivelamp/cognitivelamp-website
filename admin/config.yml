        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "Value", name: "value", widget: "string" }
      - label: "Content Blocks"
        name: "content"
        widget: "list"
        fields:
          - label: "Type"
            name: "type"
            widget: "select"
            options:
              - { label: "Paragraph", value: "paragraph" }
