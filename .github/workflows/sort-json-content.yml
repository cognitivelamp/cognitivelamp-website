name: JSON Sorting

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sort-json:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Run JSON Sorting
        run: node scripts/sort-json-content.mjs

      - name: Generate Articles Index
        run: node scripts/generate-articles-index.mjs

      - name: Generate Programs Index
        run: node scripts/generate-programs-index.mjs

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add news/content.json thought/content.json downloads/content.json gallery/content.json calendar/content.json articles/content.json programs/content.json
            git commit -m "chore: auto-maintain content indexes"
            git push
          else
            echo "No changes to commit"
          fi
