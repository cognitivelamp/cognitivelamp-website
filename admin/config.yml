    format: "json"
    identifier_field: "title"
    media_folder: "articles/{{slug}}"
    public_folder: "/articles/{{slug}}"
    summary: "{{title}} - {{date}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Cover Image", name: "image", widget: "image" }
      - { label: "Description", name: "description", widget: "text" }
      - { label: "Author", name: "author", widget: "string" }
      - { label: "Author Image", name: "authorImage", widget: "image", required: false }
      - { label: "Role", name: "role", widget: "string", required: false }
      - { label: "Category", name: "category", widget: "string", required: false }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DDTHH:mm:ss", date_format: "YYYY-MM-DD", time_format: "HH:mm:ss" }
      - { label: "Author Bio", name: "authorBio", widget: "text", required: false }
      - { label: "Core Argument", name: "coreArgument", widget: "text", required: false }
      - label: "Key Statistics"
        name: "keyStatistics"
        widget: "list"
