<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="referrer" content="strict-origin-when-cross-origin">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; img-src 'self' data: https:; media-src 'self' https:; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://fonts.googleapis.com; script-src 'self' 'unsafe-inline' https://cdn.tailwindcss.com https://www.googletagmanager.com https://embed.tawk.to https://*.tawk.to https://unpkg.com; connect-src 'self' https://www.googletagmanager.com https://region1.google-analytics.com https://www.google-analytics.com https://embed.tawk.to https://*.tawk.to wss://*.tawk.to https://va.tawk.to https://api.github.com https://cusdis.com; frame-src 'self' https://*.tawk.to https://www.google.com https://www.youtube.com https://www.youtube-nocookie.com https://www.google.com/maps https://challenges.cloudflare.com https://cusdis.com; manifest-src 'self'; worker-src 'self'; form-action 'self'; upgrade-insecure-requests">
  <title>Offline | LEADS Higher Secondary School</title>
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#1E3A8A">
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #eff6ff 0%, #f8fafc 100%);
      color: #0f172a;
    }
    .card {
      max-width: 520px;
      margin: 1rem;
      padding: 1.5rem;
      border-radius: 16px;
      background: #ffffff;
      border: 1px solid #dbeafe;
      box-shadow: 0 18px 40px -28px rgba(30, 58, 138, 0.8);
      text-align: center;
    }
    .brand {
      color: #1e3a8a;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    h1 {
      margin: 0.4rem 0 0.8rem;
      font-size: 1.5rem;
      line-height: 1.3;
    }
    p {
      margin: 0;
      color: #334155;
      line-height: 1.6;
    }
    .actions {
      margin-top: 1.2rem;
      display: flex;
      gap: 0.6rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    a,
    button {
      border: 0;
      border-radius: 999px;
      padding: 0.65rem 1rem;
      font-weight: 700;
      font-size: 0.9rem;
      cursor: pointer;
      text-decoration: none;
    }
    a {
      background: #1e3a8a;
      color: #fff;
    }
    button {
      background: #e2e8f0;
      color: #0f172a;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="brand">LEADS School</div>
    <h1>You are offline right now</h1>
    <p>The page could not be loaded because your device has no internet connection. Please reconnect and try again.</p>
    <div class="actions">
      <a href="/index.html">Go To Home</a>
      <button type="button" onclick="window.location.reload()">Try Again</button>
    </div>
  </main>
</body>
</html>
